name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ts-check
      - run: pnpm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "豆包工作室 $tag" --generate-notes
          }
          Get-ChildItem release -File | Where-Object {
            $_.Extension -in '.exe', '.blockmap' -or $_.Name -eq 'latest.yml'
          } | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
